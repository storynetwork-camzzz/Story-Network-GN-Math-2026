	.summary-content-wrap {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.summary-content-wrap::marker {
  display: inline;
}

    @keyframes slideDown {
      from { transform: translateY(-100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* ---------- RECENT REMOVE BUTTON ---------- */
    .recent-remove {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 34px;
      height: 34px;
      background: rgba(0,0,0,0.55);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.6);
      transition: all 0.25s ease;
      cursor: pointer;
      z-index: 6;
    }
    .zone-item:hover .recent-remove { opacity: 1; transform: scale(1); }
    .recent-remove svg { width: 18px; height: 18px; stroke: #ff5c5c; stroke-width: 2; fill: none; }
    .recent-remove:hover { background: rgba(255,0,0,0.6); }

    /* ---------- FAVORITES STAR ---------- */
    .zone-item { position: relative; }
    .favorite-star {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 34px;
      height: 34px;
      background: rgba(0,0,0,0.55);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.6);
      transition: all 0.25s ease;
      cursor: pointer;
      z-index: 5;
    }
    .zone-item:hover .favorite-star { opacity: 1; transform: scale(1); }
    .favorite-star svg { width: 18px; height: 18px; fill: none; stroke: gold; stroke-width: 2; }
    .favorite-star.active svg { fill: gold; }
    .star-particle {
      position: absolute;
      width: 6px; height: 6px;
      background: gold;
      border-radius: 50%;
      pointer-events: none;
      animation: particle 600ms ease-out forwards;
    }
    @keyframes particle {
      0% { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
    }

    .summary-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }
    .clear-recent {
      background: rgba(255,80,80,0.2);
      border: 1px solid rgba(255,80,80,0.4);
      padding: 0.4rem 0.9rem;
      border-radius: 9999px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
      font-size: 0.9rem;
    }
    .clear-recent:hover {
      background: rgba(255,80,80,0.4);
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(255,80,80,0.3);
    }

    details summary {
      padding: 0.9rem 1.2rem;
      background: var(--summary-bg, rgba(0,0,255,0.2));
      border-radius: 10px;
      box-shadow: 0 2px 6px var(--primary-glow);
      transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      color: var(--text-color);
    }
    details summary:hover {
      background: var(--summary-bg-hover, rgba(0,0,255,0.25));
      transform: translateY(-1px);
      box-shadow: 0 3px 8px var(--primary-glow);
    }

    .category-nav-wrapper {

      display: flex;
      align-items: center;

      gap: 0.5rem;

      transition: background 0.3s ease;

      gap: 0.5rem;

    /* ---- GLOBAL BASE STYLES ---- */
    *,*::before,*::after {
      font-family: var(--font-family) !important;
      box-sizing: border-box;
    }
    body {
      font-family: var(--font-family);
      font-weight: 500;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
      background-attachment: fixed;
      color: var(--text-color);
      overflow-x: hidden;
      transition: background 0.5s ease, color 0.5s ease;
      min-height: 100vh;
    }

    .bg-particles { display: none; } /* removed particle animation */

    h1,h2,h3,h4,h5,h6,summary,button,
    .zone-item button,#popupTitle,#zoneName,.logo,
    .control-buttons button,.zone-controls button {
      font-weight: 800 !important;
    }
    input { font-weight: 600; }

    header {
      background: linear-gradient(135deg, var(--header-bg-1), var(--header-bg-2));
      backdrop-filter: blur(20px);
      padding: 1.2rem 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow), 0 0 30px var(--primary-glow);
      border-bottom: 2px solid var(--primary-color);
      transition: all 0.5s ease;
    }
    .header-content {
    max-width: 100%;
    margin: 0;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 1rem;
    position: relative;
    z-index: 1;
    width: 100%;
    padding: 0 1rem;
}
    .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 1.6rem;
    font-weight: 900;
    text-shadow: 0 0 20px var(--primary-glow);
    transition: transform 0.3s ease, filter 0.3s ease;
    order: 1;
}
    .logo:hover { transform: scale(1.05); filter: drop-shadow(0 0 15px var(--primary-color)); }
    .logo-img {
      height: 48px;
      border-radius: 12px;
      transition: transform 0.6s ease;
    }
    .logo:hover .logo-img { transform: rotate(360deg); }

    /* ---------- SEARCH BAR - clean redesign ---------- */
    .search-container {
    flex: 1;
    min-width: 260px;
    position: relative;
    display: flex;
    align-items: center;
    order: 2;
    margin-left: 1rem;
	margin-RIGHT: 1rem;
}
    .search-icon {
      position: absolute;
      left: 16px;
      display: flex;
      align-items: center;
      pointer-events: none;
      z-index: 2;
      color: var(--search-placeholder);
      transition: color 0.3s ease;
    }
    .search-icon svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }
    .search-container:focus-within .search-icon { color: var(--primary-color); }

    #searchBar {
      width: 100%;
      padding: 0.8rem 1.2rem 0.8rem 3rem;
      border: 2px solid var(--input-border);
      border-radius: 14px;
      background: var(--input-bg);
      color: var(--text-color);
      font-size: 0.97rem;
      letter-spacing: 0.01em;
      transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
      backdrop-filter: blur(10px);
      outline: none;
    }
    #searchBar::placeholder { color: var(--search-placeholder); font-weight: 500; }
    #searchBar:hover {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    #searchBar:focus {
      border-color: var(--input-border-focus);
      box-shadow: 0 0 0 4px var(--primary-glow);
      background: rgba(0,0,0,0.15);
    }

    main {
      max-width: 100%;
      margin: 0;
      padding: 1.5rem;
      position: relative;
      z-index: 1;
    }
    .zone-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 28px;
      margin-top: 1.2rem;
    }
    .zone-item {
      background: var(--card-bg);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }
    .zone-item:hover {
      transform: translateY(-10px) scale(1.035);
      box-shadow: 0 20px 50px var(--primary-glow);
      border-color: var(--primary-color);
    }
    .zone-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
    .zone-item button {
      background: var(--input-bg);
      color: var(--text-color);
      border: none;
      padding: 14px;
      font-size: 1.05rem;
      cursor: pointer;
      text-align: center;
      flex-grow: 1;
      transition: background 0.2s;
      font-weight: 700;
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
    }
    .play-count {
      font-size: 0.75rem;
      opacity: 0.7;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .play-count svg { width: 11px; height: 11px; fill: currentColor; }
    .zone-item button:hover { background: var(--input-border); }

    /* Zone viewer */
    #zoneViewer {
      position: fixed;
      inset: 0;
      background: var(--background-color);
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: none;
      flex-direction: column;
    }
    .zone-header {
      background: linear-gradient(to bottom, var(--header-bg-1), var(--header-bg-2));
      color: white;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    #zoneName { font-size: 1.45rem; margin: 0; }
    #zoneAuthor { font-size: 0.95rem; color: rgba(255,255,255,0.8); text-decoration: none; }
    .zone-controls { display: flex; gap: 10px; flex-wrap: wrap; }
    .zone-controls button {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: white;
      padding: 0.65rem 1.3rem;
      border-radius: 9999px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      backdrop-filter: blur(4px);
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .zone-controls button:hover {
      background: var(--input-border);
      border-color: var(--primary-color);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px var(--primary-glow);
    }
    #zoneFrame {
      flex-grow: 1;
      border: none;
      width: 94%;
      height: 92%;
      margin: 20px auto;
      border-radius: 16px;
      box-shadow: var(--shadow);
      background: #000;
    }

    /* Popup */
    #popupOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      backdrop-filter: blur(6px);
    }
    .popup {
      background: var(--popup-bg);
      border-radius: 16px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.6);
      width: 90%;
      max-width: 480px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
    }
    .popup-header {
      background: var(--primary-color);
      color: white;
      padding: 1.2rem 1.6rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #popupTitle { margin: 0; font-size: 1.4rem; }
    #popupClose {
      background: none; border: none; color: white;
      font-size: 2.2rem; cursor: pointer; line-height: 1;
    }
    #popupBody {
      padding: 1.8rem;
      font-size: 1.05rem;
      line-height: 1.5;
      color: var(--text-color);
      max-height: 70vh;
      overflow-y: auto;
    }
    #popupBody button {
      width: 100%;
      padding: 1rem;
      margin: 0.8rem 0;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 9999px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 4px 15px var(--primary-glow);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    #popupBody button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px var(--primary-glow);
    }
    #popupBody button:active { transform: translateY(0); }
    #popupBody input, #popupBody textarea {
      width: 100%;
      padding: 0.8rem 1.2rem;
      margin: 0.6rem 0 1.2rem;
      border: 1px solid var(--input-border);
      border-radius: 12px;
      background: var(--input-bg);
      color: var(--text-color);
      font-size: 1rem;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      font-family: monospace;
    }
    #popupBody input:focus, #popupBody textarea:focus {
      outline: none;
      border-color: var(--input-border-focus);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    summary {
      font-size: 1.4rem;
      font-weight: 800;
      cursor: pointer;
      padding: 0.8rem;
      background: var(--favorites-bg);
      border-radius: 12px;
      margin-bottom: 1rem;
      color: var(--text-color);
      border: 1px solid rgba(255,255,255,0.05);
      transition: background 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
      backdrop-filter: blur(10px);
    }
    summary:hover {
      background: var(--summary-bg-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px var(--primary-glow);
    }

    footer {
      background: var(--card-bg);
      padding: 1.5rem;
      text-align: center;
      margin-top: 3rem;
      border-radius: 16px 16px 0 0;
      border-top: 1px solid rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .footer-links a, .footer-links label {
      color: var(--import-color);
      text-decoration: none;
      font-weight: 600;
      transition: text-shadow 0.3s ease, transform 0.3s ease;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    .footer-links a:hover, .footer-links label:hover {
      text-shadow: 0 0 15px var(--primary-glow);
      transform: translateY(-2px);
    }

    /* Color Picker Styles */
    .color-picker-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-top: 1rem;
    }
    .color-option {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 12px;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .color-option:hover { transform: scale(1.1); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .color-option.active {
      border-color: white;
      transform: scale(1.05);
    }
    .color-option.active::after {
      content: '\2713';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      color: white;
      font-size: 2rem;
      font-weight: bold;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .color-blue { background: linear-gradient(135deg, #0000ff, #00aaff); }
    .color-cyberpunk { background: linear-gradient(135deg, #ff00ff, #ff0099); }
    .color-matrix { background: linear-gradient(135deg, #00cc00, #009900); }
    .color-sunset { background: linear-gradient(135deg, #ff6b35, #ff9933); }

    .color-picker-input {
      width: 100%; height: 60px; cursor: pointer; border: none;
      padding: 0; background: none; border-radius: 12px; overflow: hidden;
    }
    .color-picker-input::-webkit-color-swatch-wrapper { padding: 0; }
    .color-picker-input::-webkit-color-swatch { border: none; border-radius: 12px; }

    .theme-option {
      width: 100%; aspect-ratio: 1;
      border-radius: 12px;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background-size: cover; background-position: center;
    }
    .theme-option img { width: 70%; height: 70%; object-fit: contain; border-radius: 8px; }
    .theme-option:hover { transform: scale(1.1); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .theme-option.active {
      border-color: white;
      transform: scale(1.05);
      box-shadow: 0 0 20px var(--primary-color);
    }
    .theme-option.active::after {
      content: '\2713';
      position: absolute; bottom: 8px; right: 8px;
      color: white; font-size: 1.5rem; font-weight: bold;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      background: var(--primary-color);
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    .theme-default { background: linear-gradient(135deg, #050505, #0a0a0a); }
    .theme-library { background: linear-gradient(135deg, #050505, #cc0000); }
    .theme-lebron { background: linear-gradient(135deg, #050505, #552583); }
    .theme-steam { background: linear-gradient(135deg, #050505, #66c0f4); }

    /* Settings Tabs */
    .settings-tabs {
      display: flex; gap: 1rem; margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--input-border);
      overflow-x: auto;
    }
    .settings-tab {
      padding: 0.75rem 1.5rem;
      background: transparent; border: none;
      color: var(--text-color); font-size: 1rem; font-weight: 700;
      cursor: pointer;
      transition: color 0.3s ease, border-color 0.3s ease;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px; white-space: nowrap;
    }
    .settings-tab:hover { color: var(--primary-color); }
    .settings-tab.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }
    .settings-panel { display: none; }
    .settings-panel.active { display: block; }

    .code-export-box {
      background: rgba(0,0,0,0.5);
      color: #00ff00;
      font-family: 'Courier New', monospace;
      padding: 1rem; border-radius: 8px;
      width: 100%; min-height: 200px;
      border: 1px solid #333; resize: vertical;
    }

    /* Lucide icon normalization */
    .icon-btn-label {
      display: inline-flex; align-items: center; gap: 0.4rem;
    }

	/* ================= PERFORMANCE MODE ================= */

.performance-mode *,
.performance-mode *::before,
.performance-mode *::after {
    animation: none !important;
    transition: none !important;
    backdrop-filter: none !important;
    filter: none !important;
    text-shadow: none !important;
    box-shadow: none !important;
    scroll-behavior: auto !important;
}

.performance-mode .zone-item:hover {
    transform: none !important;
}

.performance-mode img {
    image-rendering: optimizeSpeed !important;
}

.performance-mode iframe {
    will-change: auto !important;
}

.performance-mode .logo:hover,
.performance-mode .logo:hover .logo-img {
    transform: none !important;
    filter: none !important;
}

.performance-setting {
    margin-top: 20px;
    padding: 16px;
    border-radius: 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
}

.performance-toggle {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 12px;
    font-weight: 700;
}

    @media (max-width: 768px) {
      .header-content { grid-template-columns: auto 1fr auto; gap: 0.5rem; }

      .zone-controls { flex-direction: column; gap: 12px; }
      .zone-controls button { width: 100%; }
    }
  </style>
</head>

    function hexToRgb(hex) {
      var shorthand = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
      hex = hex.replace(shorthand, (m,r,g,b) => r+r+g+g+b+b);
      var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? {
        r: parseInt(result[1],16),
        g: parseInt(result[2],16),
        b: parseInt(result[3],16)
      } : null;
    }

    async function listZones() {
      try {
        const response = await fetch(zonesURL + "?t=" + Date.now());
        const json = await response.json();

        zones = [...STORY_NETWORK_GAMES, ...json.filter(z => !isBlocked(z.name))];

        await fetchPopularity();
        sortZones();
        updateRecentlyPlayed();

        const search = new URLSearchParams(window.location.search);
        const id = search.get('id');
        const embed = window.location.hash.includes("embed");
        if (id) {
          const zone = zones.find(zone => zone.id + '' == id + '');
          if (zone) {
            if (embed) {
              if (zone.url.startsWith("http")) {
                window.open(zone.url, "_blank");
              } else {
                const url = zone.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
                fetch(url + "?t=" + Date.now()).then(r => r.text()).then(html => {
                  document.documentElement.innerHTML = html;
                  const popup = document.createElement("div");
                  popup.style.cssText = "position:fixed;bottom:20px;right:20px;background:#cce5ff;color:#004085;padding:10px;border:1px solid #b8daff;border-radius:5px;box-shadow:0 0 10px rgba(0,0,0,0.1);font-family:Arial,sans-serif;";

        data.forEach(file => {

    function createZoneCard(file, mode = "normal") {
      const zoneItem = document.createElement("div");
      zoneItem.className = "zone-item";
      zoneItem.onclick = () => openZone(file);

      // Show favorite star on all modes (including recent)
      const star = document.createElement("div");
      star.className = "favorite-star";
      star.innerHTML = `<svg viewBox="0 0 24 24"><polygon points="12 2 15 9 22 9 17 14 19 22 12 18 5 22 7 14 2 9 9 9"></polygon></svg>`;
      if (getFavorites().includes(file.id)) star.classList.add("active");
      star.onclick = (e) => { e.stopPropagation(); toggleFavorite(file.id, star); };
      zoneItem.appendChild(star);

      if (file.storyNetwork) {
        const badge = document.createElement("div");
        badge.style.cssText = "position:absolute;top:10px;left:10px;background:var(--primary-color);color:white;font-size:0.65rem;font-weight:800;padding:0.25rem 0.5rem;border-radius:9999px;z-index:5;letter-spacing:0.05em;text-transform:uppercase;box-shadow:0 2px 8px var(--primary-glow);";
        badge.textContent = "Story Network";
        zoneItem.appendChild(badge);
      }

      const img = document.createElement("img");
      if (file.cover && file.cover.startsWith("http")) {
        img.dataset.src = file.cover;
      } else {
        img.dataset.src = file.cover
          .replace("{COVER_URL}", coverURL)
          .replace("{HTML_URL}", htmlURL);
      }
      img.alt = file.name;
      img.loading = "lazy";
      img.className = "lazy-zone-img";

      const btn = document.createElement("button");
      const nameSpan = document.createElement("span");
      nameSpan.textContent = file.name;
      nameSpan.style.fontWeight = "700";
      btn.appendChild(nameSpan);

      const playCounts = JSON.parse(localStorage.getItem("playCounts") || "{}");
      const userPlays = playCounts[file.id] || 0;
      if (userPlays > 0) {
        const countSpan = document.createElement("span");
        countSpan.className = "play-count";
        // Small play icon SVG inline
        countSpan.innerHTML = `<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>Played ${userPlays} time${userPlays===1?'':'s'}`;
        btn.appendChild(countSpan);
      }

      btn.onclick = (e) => { e.stopPropagation(); openZone(file); };
      zoneItem.appendChild(img);
      zoneItem.appendChild(btn);

      const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.src = entry.target.dataset.src;
            entry.target.classList.remove("lazy-zone-img");
            obs.unobserve(entry.target);
          }
        });
      }, { rootMargin: "120px", threshold: 0.1 });
      observer.observe(img);

      return zoneItem;
    }

    function filterZones() {
      const query = searchBar.value.toLowerCase();
      const favoritesSection = document.getElementById('favoriteZonesWrapper');
      const recentSection = document.getElementById('recentZonesWrapper');
      const dividers = document.querySelectorAll('main > hr');

      if (query.length > 0) {
        // While searching: filter within the current category
        favoritesSection.style.display = 'none';
        recentSection.style.display = 'none';
        dividers.forEach(hr => hr.style.display = 'none');

      } else {
        // Search cleared: restore the active category view
        filterByCategory(currentCategory, null);

        document.querySelectorAll('.category-btn').forEach(btn => {
          const onclick = btn.getAttribute('onclick') || '';

            btn.classList.add('active');
          }

    function openZone(file) {
      recordRecent(file.id);
      const fetchTarget = file.fetchUrl || (file.url.startsWith("http") ? null : file.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL));
      if (!fetchTarget) {
        window.open(file.url, "_blank");
        return;
      }
      document.getElementById('zoneName').textContent = "Loading...";
      // Always create a fresh iframe (fixes the "second game won't load" bug)
      if (zoneFrame) { try { zoneViewer.removeChild(zoneFrame); } catch(e) {} }
      zoneFrame = document.createElement("iframe");
      zoneFrame.id = "zoneFrame";
      zoneFrame.style.cssText = "flex-grow:1;border:none;width:94%;height:92%;margin:20px auto;border-radius:16px;box-shadow:var(--shadow);background:#000;opacity:0.3;pointer-events:none;";
      zoneViewer.appendChild(zoneFrame);
      document.getElementById("zoneLoading").style.display = "block";
      fetch(fetchTarget + "?t=" + Date.now())
        .then(r => r.text())
        .then(html => {
          zoneFrame.contentDocument.open();
          zoneFrame.contentDocument.write(html);
          zoneFrame.contentDocument.close();
          zoneFrame.style.opacity = "1";
          zoneFrame.style.pointerEvents = "auto";
          document.getElementById("zoneLoading").style.display = "none";
          document.getElementById('zoneName').textContent = file.name;
          document.getElementById('zoneId').textContent = file.id;
          document.getElementById('zoneAuthor').textContent = "by " + file.author;
          if (file.authorLink) document.getElementById('zoneAuthor').href = file.authorLink;
          zoneViewer.style.display = "flex";
          const newURL = new URL(window.location);
          newURL.searchParams.set('id', file.id);
          history.pushState(null, '', newURL.toString());
        })
        .catch(err => {
          document.getElementById("zoneLoading").style.display = "none";
          alert("Failed to load zone: " + err);
        });
    }

    function aboutBlank() {
      const newWindow = window.open("about:blank", "_blank");
      let zone = zones.find(z => z.id + '' === document.getElementById('zoneId').textContent);
      const url = zone.fetchUrl || zone.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
      fetch(url + "?t=" + Date.now()).then(r => r.text()).then(html => {
        if (newWindow) { newWindow.document.open(); newWindow.document.write(html); newWindow.document.close(); }
      });
    }

    function closeZone() {
      zoneViewer.style.display = "none";
      try { zoneViewer.removeChild(zoneFrame); } catch(e) {}
      zoneFrame = null;
      const url = new URL(window.location);
      url.searchParams.delete('id');
      history.pushState(null, '', url.toString());
    }

    function downloadZone() {
      let zone = zones.find(z => z.id + '' === document.getElementById('zoneId').textContent);
      const dlUrl = zone.fetchUrl || zone.url.replace("{HTML_URL}", htmlURL);
      fetch(dlUrl + "?t=" + Date.now())
        .then(res => res.text())
        .then(text => {
          const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = zone.name + ".html"; a.click();
          URL.revokeObjectURL(url);
        });
    }

    function fullscreenZone() {
      const el = zoneFrame;
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }

    function saveData() {
      let data = JSON.stringify(localStorage) + "\n\n|\n\n" + document.cookie;
      const link = document.createElement("a");

      link.download = `${Date.now()}.data`;
      link.click();

    function loadData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const [lsData, cookieData] = e.target.result.split("\n\n|\n\n");
        try { const parsed = JSON.parse(lsData); for (let key in parsed) localStorage.setItem(key, parsed[key]); } catch {}
        if (cookieData) cookieData.split("; ").forEach(c => document.cookie = c);
        alert("Data loaded");
        location.reload();
      };
      reader.readAsText(file);
    }

        dividers.forEach(hr => hr.style.display = 'none');
      }

      let filteredZones = [];

      if (category === 'all') {
        filteredZones = zones.filter(z => !isBlocked(z.name));
      } else if (category === 'story-network') {
        filteredZones = zones.filter(z => z.storyNetwork && !isBlocked(z.name));
      } else if (category === 'popular') {
        filteredZones = zones.filter(z => !isBlocked(z.name) && isPopular(z.name));
      } else if (category === 'random') {
        filteredZones = zones.filter(z => !isBlocked(z.name) && z.name.toLowerCase().includes('random'));
      } else if (category === 'fnf') {
        filteredZones = zones.filter(z => !isBlocked(z.name) &&
          (z.name.toLowerCase().includes('fnf') || z.name.toLowerCase().includes('friday night funkin')));
      } else if (category === 'fnaf') {
        filteredZones = zones.filter(z => !isBlocked(z.name) &&
          (z.name.toLowerCase().includes('fnaf') || z.name.toLowerCase().includes('five nights at')));
      } else if (category === 'minecraft') {
        filteredZones = zones.filter(z => !isBlocked(z.name) &&
          z.name.toLowerCase().includes('minecraft'));
      } else if (category === 'toby-fox') {
        const tobyKeywords = ['undertale', 'deltarune', 'underwheels', 'deltatraveler', 'bad monday simulator', 'bad time simulator', 'scampton the great', 'undertale yellow', 'worst time simulator'];
        const fnfKeywords = ['fnf', 'friday night funkin'];
        filteredZones = zones.filter(z => {
          if (isBlocked(z.name)) return false;
          const name = z.name.toLowerCase();
          const isFNF = fnfKeywords.some(k => name.includes(k));
          if (isFNF) return false;
          return tobyKeywords.some(k => name.includes(k));
        });
      }

      displayZones(filteredZones);
      const summaryText = {
        'all': 'All Games', 'story-network': 'Story Network', 'popular': 'Popular',
        'random': 'Random', 'fnf': 'FNF', 'fnaf': 'FNAF', 'minecraft': 'Minecraft', 'toby-fox': 'Toby Fox'
      }[category] || 'Games';
      document.getElementById("allZonesWrapper")
        .querySelector("summary")
        .textContent = `${summaryText} (${filteredZones.filter(z => !isBlocked(z.name)).length})`;
    }

    function openMinecraft188() {
      const mc188 = zones.find(z => z.name.toLowerCase().includes('minecraft') && z.name.toLowerCase().includes('1.8.8'));
      if (!mc188) { alert("Minecraft 1.8.8 not found!"); return; }
      const newWindow = window.open("about:blank", "_blank");
      const url = mc188.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
      fetch(url + "?t=" + Date.now())
        .then(r => r.text())
        .then(html => {
          if (newWindow) { newWindow.document.open(); newWindow.document.write(html); newWindow.document.close(); }
        })
        .catch(err => alert("Failed to load game: " + err));
    }

    function getNotifSettings() {
      return JSON.parse(localStorage.getItem('notifSettings') || '{"showOnMain":true}');
    }
    function saveNotifSettings(obj) {
      localStorage.setItem('notifSettings', JSON.stringify(obj));
    }
    function getDismissed() {
      return JSON.parse(localStorage.getItem('dismissedNotifs') || '[]');
    }
    function dismissNotif(id) {
      const d = getDismissed();
      if (!d.includes(id)) { d.push(id); localStorage.setItem('dismissedNotifs', JSON.stringify(d)); }
    }

    function renderMainBanners() {
      const container = document.getElementById('notifications-banner-container');
      container.innerHTML = '';
      const settings = getNotifSettings();
      if (!settings.showOnMain) { updateNotifDot(); return; }
      const dismissed = getDismissed();
      NOTIFICATIONS.filter(n => n.active && !dismissed.includes(n.id)).forEach(n => {
        const div = document.createElement('div');
        div.style.cssText = `background:linear-gradient(135deg,${n.color},${n.color}cc);color:white;padding:1rem 1.5rem;border-radius:12px;margin-bottom:1.5rem;box-shadow:0 4px 20px ${n.color}55;display:flex;justify-content:space-between;align-items:center;gap:1rem;animation:slideDown 0.5s ease;`;
        div.innerHTML = `
          <div>
            <strong style="font-size:1.3rem;">${n.title}</strong>
            <hr style="border:none;border-top:1px solid rgba(255,255,255,0.4);margin:0.4rem 0;">
            <span style="font-size:0.95rem;opacity:0.95;">${n.body}</span>
          </div>
          <button onclick="dismissNotif('${n.id}'); this.closest('div').remove(); updateNotifDot();" style="background:rgba(255,255,255,0.2);border:none;color:white;padding:0.5rem 1rem;border-radius:20px;cursor:pointer;font-weight:700;white-space:nowrap;">
            Got it!
          </button>`;
        container.appendChild(div);
      });
      updateNotifDot();
    }

    function updateNotifDot() {
      const dismissed = getDismissed();
      const hasUnread = NOTIFICATIONS.some(n => !dismissed.includes(n.id));
      document.getElementById('notifDot').style.display = hasUnread ? 'block' : 'none';
    }

    function showNotifications() {
      const dismissed = getDismissed();
      const rows = NOTIFICATIONS.map(n => `
        <div style="background:${n.color}22;border:1px solid ${n.color}55;border-radius:12px;padding:1.2rem;margin-bottom:1rem;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
            <strong style="font-size:1.1rem;">${n.title}</strong>
            <span style="font-size:0.75rem;opacity:0.6;">${n.date} · ${n.active ? 'Active' : 'Old'}</span>
          </div>
          <p style="margin:0;font-size:0.95rem;opacity:0.85;">${n.body}</p>
          ${!dismissed.includes(n.id) ? `<button onclick="dismissNotif('${n.id}'); renderMainBanners(); showNotifications();" style="margin-top:0.75rem;padding:0.4rem 1rem;font-size:0.8rem;border-radius:9999px;">Dismiss</button>` : ''}
        </div>`).join('');

      document.getElementById('notifPage').innerHTML = `
        <div style="padding:2rem 1.5rem;">
          <div style="display:flex;align-items:center;gap:1rem;margin-bottom:2rem;">
            <button onclick="closeNotifPage()" style="background:var(--input-bg);border:1px solid var(--input-border);color:var(--text-color);padding:0.6rem 1.2rem;border-radius:9999px;cursor:pointer;font-weight:700;font-size:0.95rem;display:inline-flex;align-items:center;gap:0.5rem;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
              Back
            </button>
            <h2 style="margin:0;font-size:1.8rem;">Notifications</h2>
          </div>
          ${rows || '<p style="opacity:0.5;">No notifications.</p>'}
        </div>`;
      document.getElementById('notifPage').style.display = 'block';
      document.getElementById('mainContent').style.display = 'none';
      updateNotifDot();
    }

    function closeNotifPage() {
      document.getElementById('notifPage').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
    }

    function showNotifSettings() {
      const s = getNotifSettings();
      document.getElementById('popupTitle').textContent = 'Notification Settings';
      document.getElementById('popupBody').innerHTML = `
        <p style="opacity:0.8;font-size:0.9rem;">Notifications always appear in the notification tab. Control whether they also show on the main page.</p>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:1rem;padding:1rem;background:var(--input-bg);border-radius:12px;border:1px solid var(--input-border);">
          <span style="font-weight:700;">Show on Main Page</span>
</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:1rem;padding:1rem;background:var(--input-bg);border-radius:12px;border:1px solid var(--input-border);">
          <span style="font-weight:700;">Show on Main Page</span>
          <input type="checkbox" id="notifMainToggle" ${s.showOnMain ? 'checked' : ''} onchange="saveNotifSettings({showOnMain:this.checked}); renderMainBanners();" style="width:20px;height:20px;cursor:pointer;">
        </div>
      </div> <h3 style="margin-top:2rem; margin-bottom:1rem; border-bottom:1px solid var(--input-border); padding-bottom:0.5rem;">Site Settings</h3>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:1rem;background:var(--input-bg);border-radius:12px;border:1px solid var(--input-border);">
        <div>
          <span style="font-weight:700; display:block;">Performance Mode</span>
          <small style="opacity:0.7; font-size:0.8rem;">Speeds up the site by removing animations and effects.</small>
        </div>
        <input type="checkbox" id="perfToggle" ${document.body.classList.contains('performance-mode') ? 'checked' : ''} onchange="togglePerformanceMode()" style="width:20px;height:20px;cursor:pointer;">
      </div>
    `;
      document.getElementById('popupOverlay').style.display = 'flex';
    }

    renderMainBanners();

    // --- PERFORMANCE MODE ENGINE ---
    window.togglePerformanceMode = function() {
      const isEnabled = document.body.classList.toggle('performance-mode');
      localStorage.setItem('perfMode', isEnabled);
      const toggle = document.getElementById('perfToggle');
      if (toggle) toggle.checked = isEnabled;
    };

    if (localStorage.getItem('perfMode') === 'true') {
      document.body.classList.add('performance-mode');
    }

    // --- BLOCKED DOMAINS FILTER ---
    const schoolList = ["deledao","goguardian","lightspeed","linewize","securly",".edu/"];
    function isBlockedDomain(url) {
      try {
        const domain = new URL(url, location.origin).hostname + "/";
        return schoolList.some(s => domain.includes(s));
      } catch (e) { return false; }
    }
    const originalFetch = window.fetch;
    window.fetch = function(url, options) {
      if (typeof url === 'string' && isBlockedDomain(url)) return Promise.reject(new Error("blocked"));
      return originalFetch.apply(this, arguments);
    };
    const originalOpen = XMLHttpRequest.prototype.open;
    XMLHttpRequest.prototype.open = function(method, url) {
      if (typeof url === 'string' && isBlockedDomain(url)) return;
      return originalOpen.apply(this, arguments);
    };
    HTMLCanvasElement.prototype.toDataURL = function() { return ""; };

    // Initialize Site Features
    loadSavedTheme();
    listZones();
  </script>
</body>
</html>
